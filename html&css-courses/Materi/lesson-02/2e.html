<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .apply-button{
            background-color: rgb(10, 102, 194);
            color: white;
            border: none;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-right: 13px;
            padding-left: 13px;
            border-radius: 50px;
            margin-right: 10px;
            font-weight: bold;
        }

        .save-button{
            background-color: white;
            color: rgb(10, 102, 194);
            border: 2px;
            border-style: solid;
            border-color: rgb(10, 102, 194);
            padding-top: 10px;
            padding-bottom: 10px;
            padding-right: 13px;
            padding-left: 13px;
            border-radius: 50px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <button class="apply-button">Terapkan Pada Profile Perusahaan</button>
    <button class="save-button">Simpan</button>
</body>
</html>
