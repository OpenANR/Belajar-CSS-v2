<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .get-started{
            background-color: rgb(121, 82, 179);
            color: white;
            border: none;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-right: 13px;
            padding-left: 13px;
            border-radius: 3px;
            font-weight: bold;
            margin-right: 5px;
            cursor: pointer;
            transition: background-color 0.15s;
        }

        .get-started:hover{
            background-color: rgb(93, 59, 144);
        }

        .download-button{
            background-color: white;
            color: rgb(108, 117, 125);
            font-weight: bold;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-right: 13px;
            padding-left: 13px;
            border: 1px;
            border-style: solid;
            border-color: rgb(108, 117, 125);
            border-radius: 3px;
            cursor: pointer;
            transition: background-color 0.15s, color 0.15s;
        }

        .download-button:hover{
            background-color: gray;
            color: white;
        }
    </style>
</head>
<body>
    <button class="get-started">Mulai sekarang</button>
    <button class="download-button">Download</button>
</body>
</html>
