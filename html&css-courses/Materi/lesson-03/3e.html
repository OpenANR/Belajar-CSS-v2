<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .apply-button {
            background-color: rgb(10, 102, 194);
            color: white;
            border: none;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-right: 13px;
            padding-left: 13px;
            border-radius: 50px;
            margin-right: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.15s;
        }

        .apply-button:hover {
            background-color: rgb(9, 84, 160);
        }

        .save-button {
            background-color: white;
            color: rgb(10, 102, 194);
            border: none;
            box-shadow: inset 0 0 0 1px rgb(10, 102, 194);
            border-width: 1px;
            border-style: solid;
            border-color: rgb(10, 102, 194);
            padding-top: 10px;
            padding-bottom: 10px;
            padding-right: 13px;
            padding-left: 13px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: box-shadow 0.15s, background-color 0.15s;
        }

        .save-button:hover {
            box-shadow: inset 0 0 0 2px rgb(10, 102, 194);
            background-color: rgb(226, 240, 254);
        }
    </style>
</head>

<body>
    <button class="apply-button">Terapkan Pada Profile Perusahaan</button>
    <button class="save-button">Simpan</button>
</body>

</html>
