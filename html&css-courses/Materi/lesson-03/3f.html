<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        a{
            color: rgb(0, 113, 133);
        }

        .title{
            font-weight: bold;
            font-size: large;
        }

        .cost{
            color: rgb(0, 118, 0);
            font-weight: bold;
        }

        .add-chart{
            background-color: rgb(255, 216, 20);
            border: none;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-right: 13px;
            padding-left: 13px;
            border-radius: 50px;
            margin-right: 10px;
            cursor: pointer;
            transition: background-color 0.15s;
        }

        .add-chart:hover{
            background-color: rgb(176, 148, 12);
        }

        .add-chart:active{
            background-color: rgb(255, 231, 108);
        }

        .buy-now{
            background-color: rgb(255, 164, 28);
            padding-top: 10px;
            padding-bottom: 10px;
            padding-right: 13px;
            padding-left: 13px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: background-color 0.15s;
        }

        .buy-now:hover{
            background-color: rgb(220, 140, 20);
        }

        .buy-now:active{
            background-color: rgb(255, 195, 105);
        }
    </style>
</head>

<body>
    <a href="https://www.google.com" target="_blank">Kembali ke Google</a>

    <p class="title">Keyboard Standart QWERTY</p>
    <p class="cost">Rp50.000 per item</p>
    <p>Gratis pengiriman pada hari Jum'at</p>

    <button class="add-chart">Tambah ke Keranjag</button>
    <button class="buy-now">Beli Sekarang</button>
</body>

</html>
