<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        
        button {
            padding-left: 15px;
            padding-right: 15px;
            margin-left: 10px;
            margin-right: 10px;
            cursor: pointer;
            background-color: green;
            cursor: pointer;
            font-size: 18px;
            color: white;
            border: none;
            transition: padding 0.15s, margin 0.15s;
        }

        button:hover {
            padding-left: 25px;
            padding-right: 25px;
            margin-left: 0px;
            margin-right: 0px;
        }
    </style>
</head>

<body>
    <button>Satu</button>
    <button>Dua</button>
    <button>Tiga</button>
</body>

</html>
