<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        p {
            font-family: 'Verdana';
            margin-top: 0;
            margin-bottom: 0;
        }

        .judul-utama {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .caption-singkat {
            color: gray;
            margin-bottom: 20px;
        }

        .deskripsi {
            width: 350px;
            line-height: 23px;
            margin-bottom: 30px;
        }

        .mari-mulai {
            font-family: 'Verdana';
            padding-top: 10px;
            padding-bottom: 10px;
            padding-right: 15px;
            padding-left: 15px;
            border-radius: 3px;
            background-color: green;
            color: white;
            border: none;
            cursor: pointer;
            transition: background-color 0.15s;
        }

        .mari-mulai:hover {
            background-color: rgb(1, 96, 1);
        }
    </style>
</head>
<body>
    <p class="judul-utama">Kursus Belajar HTML & CSS</p>
    <p class="caption-singkat">Untuk Pemula ke Profesional</p>

    <p class="deskripsi">Dalam kursus ini kita akan mencoba belajar HTML & CSS dari pemula hingga profesional dalam waktu 6 jam.</p>

    <button class="mari-mulai">Mari Mulai</button>
</body>
</html>
