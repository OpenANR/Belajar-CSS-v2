<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
        }

        .gambar-kucing {
            width: 50px;
            height: 50px;
            object-fit: cover;
            border-radius: 50px;
            vertical-align: middle;
        }

        .message {
            font-size: 18px;
            border: none;
            width: 300px;
            vertical-align: middle;
        }

        .tweet-button {
            background-color: rgb(29, 155, 240);
            color: white;
            border: none;
            padding-top: 8px;
            padding-bottom: 8px;
            padding-left: 16px;
            padding-right: 16px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            vertical-align: middle;
        }
    </style>
</head>

<body>
    <img src="img/kucing.jpg" alt="kucing.jpg" class="gambar-kucing">
    <p class="message">Apa yang terjadi ?</p>
    <button class="tweet-button">Tweet</button>
</body>

</html>
